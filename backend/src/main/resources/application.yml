spring:
  application:
    name: bny-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:bnytechdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # In dev we let hibernate do updates if flyway is disabled, but here we use flyway.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    url: jdbc:h2:mem:bnytechdb;DB_CLOSE_DELAY=-1
    user: sa
    password: 
    locations: classpath:db/empty

logging:
  level:
    com.bnytechnology.backend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    url: ${DB_URL}
    user: ${DB_USER}
    locations: classpath:db/postgresql-migration

logging:
  level:
    com.bnytechnology.backend: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
